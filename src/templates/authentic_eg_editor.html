<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentic Existential Graph Editor</title>
    <link rel="stylesheet" href="/static/authentic_eg.css">
</head>
<body>
    <div class="container">
        <header class="toolbar">
            <div class="tool-group">
                <label>Tool:</label>
                <input type="radio" id="select" name="tool" value="select" checked>
                <label for="select">Select</label>
                
                <input type="radio" id="entity" name="tool" value="entity">
                <label for="entity">Entity</label>
                
                <input type="radio" id="predicate" name="tool" value="predicate">
                <label for="predicate">Predicate</label>
                
                <input type="radio" id="cut" name="tool" value="cut">
                <label for="cut">Cut</label>
                
                <input type="radio" id="ligature" name="tool" value="ligature">
                <label for="ligature">Ligature</label>
            </div>
            
            <div class="action-group">
                <select id="example-selector">
                    <option value="">Load Example...</option>
                </select>
                <button id="validate-btn">Validate</button>
                <button id="clear-btn">Clear</button>
                <button id="help-btn">Help</button>
            </div>
        </header>
        
        <main class="editor-area">
            <canvas id="eg-canvas" width="800" height="600"></canvas>
        </main>
        
        <aside class="info-panel">
            <h3>Graph Information</h3>
            <div id="graph-info">
                <p>Entities: <span id="entity-count">0</span></p>
                <p>Predicates: <span id="predicate-count">0</span></p>
                <p>Cuts: <span id="cut-count">0</span></p>
                <p>Ligatures: <span id="ligature-count">0</span></p>
            </div>
            
            <h3>Validation</h3>
            <div id="validation-info">
                <p id="validation-status">Valid</p>
                <ul id="validation-issues"></ul>
            </div>
        </aside>
        
        <footer class="status-bar">
            <span id="status-text">Ready - Authentic EG Editor based on corpus examples</span>
        </footer>
    </div>
    
    <script src="/static/authentic_eg.js"></script>
</body>
</html>
